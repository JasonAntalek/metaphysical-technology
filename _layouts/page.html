---
layout: default
---
<article class="record">
  <header class="record-header">
    <p class="eyebrow">{{ page.record_type | default: "Public reference" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="dek">{{ page.description }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
